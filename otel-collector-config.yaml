# OpenTelemetry Collector — no-op sink for dev.
# In prod (phase 10) replace exporters with a real backend (Tempo, Jaeger, etc.)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Logging exporter writes traces to collector stdout — useful for dev debugging.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
