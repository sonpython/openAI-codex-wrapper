{# Partial: toast notification for HTMX responses.
   Context variables:
     message — str  — message text to display
     level   — str  — "success" | "error" | "info"
#}
<div
  id="toast-inner"
  role="alert"
  class="flex items-center gap-3 rounded-lg border px-4 py-3 text-sm shadow-sm
    {% if level == 'success' %}bg-green-50 border-green-200 text-green-800
    {% elif level == 'error' %}bg-red-50 border-red-200 text-red-800
    {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}"
  _="on load wait 4s then add .opacity-0 .transition-opacity .duration-500 then wait 0.5s then remove me"
>
  {% if level == 'success' %}
    <svg class="h-4 w-4 shrink-0 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
  {% elif level == 'error' %}
    <svg class="h-4 w-4 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  {% else %}
    <svg class="h-4 w-4 shrink-0 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  {% endif %}
  <span>{{ message }}</span>
  <button
    type="button"
    onclick="this.closest('[role=alert]').remove()"
    class="ml-auto text-gray-400 hover:text-gray-600"
  >
    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
</div>
