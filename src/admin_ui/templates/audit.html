{% extends "base.html" %}

{% block title %}Audit Log{% endblock %}

{% block content %}
<div class="mb-6 flex items-center justify-between">
  <h2 class="text-lg font-semibold text-gray-800">Audit Log</h2>
  <span class="text-sm text-gray-500">Total: <span id="audit-total">{{ total }}</span></span>
</div>

<!-- Filter form — changes trigger HTMX live reload (300ms debounce) -->
<form id="audit-filter-form"
      hx-get="/admin/ui/audit/_table"
      hx-target="#audit-table-wrapper"
      hx-swap="innerHTML"
      hx-trigger="change delay:300ms from:input,select"
      hx-include="closest form"
      class="mb-4 flex flex-wrap gap-3 items-end rounded-xl bg-white border border-gray-100 p-4 shadow-sm">

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Action</label>
    <input type="text" name="action" value="{{ action_filter }}"
           placeholder="create, rotate, revoke…"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none w-44" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">User ID</label>
    <input type="text" name="user_id" value="{{ user_id_filter }}"
           placeholder="UUID…"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none w-64 font-mono" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">From</label>
    <input type="datetime-local" name="from" value="{{ from_filter }}"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">To</label>
    <input type="datetime-local" name="to" value="{{ to_filter }}"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Limit</label>
    <select name="limit"
            class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
      {% for n in [25, 50, 100, 250, 500] %}
        <option value="{{ n }}" {% if n == limit %}selected{% endif %}>{{ n }}</option>
      {% endfor %}
    </select>
  </div>

  <input type="hidden" name="offset" value="0" />
</form>

<!-- Table wrapper — HTMX swaps this div content on filter/page change -->
<div id="audit-table-wrapper">
  {% include "partials/audit_table_fragment.html" %}
</div>
{% endblock %}

{% block head %}
<script>
// Update total count when HTMX swaps table
document.addEventListener('htmx:afterSwap', function(evt) {
  if (evt.detail.target && evt.detail.target.id === 'audit-table-wrapper') {
    const totalEl = evt.detail.target.querySelector('[data-audit-total]');
    if (totalEl) {
      document.getElementById('audit-total').textContent = totalEl.dataset.auditTotal;
    }
  }
});

function auditGoTo(offset) {
  const form = document.getElementById('audit-filter-form');
  form.querySelector('input[name=offset]').value = offset;
  htmx.trigger(form, 'change');
}

// Toggle JSON detail expand
function toggleDetail(id) {
  const el = document.getElementById('detail-' + id);
  if (el) el.classList.toggle('hidden');
}
</script>
{% endblock %}
