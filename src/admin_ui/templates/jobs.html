{% extends "base.html" %}

{% block title %}Jobs{% endblock %}

{% block content %}
<!-- Detail modal overlay -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40"
     onclick="if(event.target===this) closeDetailModal()">
  <div id="detail-modal-content" class="w-full max-w-3xl max-h-[85vh] overflow-y-auto rounded-xl bg-white shadow-xl">
  </div>
</div>

<div class="mb-6 flex items-center justify-between">
  <h2 class="text-lg font-semibold text-gray-800">Job Inspector</h2>
  <span class="text-sm text-gray-500">Total: <span id="jobs-total">{{ total }}</span></span>
</div>

<!-- Filter form — changes trigger HTMX live reload (300ms debounce) -->
<form id="jobs-filter-form"
      hx-get="/admin/ui/jobs/_table"
      hx-target="#jobs-table-wrapper"
      hx-swap="innerHTML"
      hx-trigger="change delay:300ms from:input,select, change delay:300ms from:select"
      hx-include="closest form"
      class="mb-4 flex flex-wrap gap-3 items-end rounded-xl bg-white border border-gray-100 p-4 shadow-sm">

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Status</label>
    <select name="status"
            class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none min-w-[130px]">
      <option value="">All</option>
      {% for s in valid_statuses %}
        <option value="{{ s }}" {% if s == status_filter %}selected{% endif %}>{{ s|capitalize }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">User ID</label>
    <input type="text" name="user_id" value="{{ user_id_filter }}"
           placeholder="UUID…"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none w-64 font-mono" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">From</label>
    <input type="datetime-local" name="from" value="{{ from_filter }}"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">To</label>
    <input type="datetime-local" name="to" value="{{ to_filter }}"
           class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-500 uppercase tracking-wide">Limit</label>
    <select name="limit"
            class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
      {% for n in [25, 50, 100, 250, 500] %}
        <option value="{{ n }}" {% if n == limit %}selected{% endif %}>{{ n }}</option>
      {% endfor %}
    </select>
  </div>

  <input type="hidden" name="offset" value="0" />
</form>

<!-- Table wrapper — HTMX swaps this div content on filter/page change -->
<div id="jobs-table-wrapper">
  {% include "partials/jobs_table_fragment.html" %}
</div>
{% endblock %}

{% block head %}
<script>
function openDetailModal(jobId) {
  const modal = document.getElementById('detail-modal');
  const content = document.getElementById('detail-modal-content');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  content.innerHTML = '<p class="p-6 text-gray-500 text-sm">Loading…</p>';
  htmx.ajax('GET', '/admin/ui/jobs/' + jobId + '/_detail', {target: '#detail-modal-content', swap: 'innerHTML'});
}

function closeDetailModal() {
  const modal = document.getElementById('detail-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

// Update total count when HTMX swaps table
document.addEventListener('htmx:afterSwap', function(evt) {
  if (evt.detail.target && evt.detail.target.id === 'jobs-table-wrapper') {
    const totalEl = evt.detail.target.querySelector('[data-jobs-total]');
    if (totalEl) {
      document.getElementById('jobs-total').textContent = totalEl.dataset.jobsTotal;
    }
  }
});

// Pagination: update hidden offset and re-trigger
function jobsGoTo(offset) {
  const form = document.getElementById('jobs-filter-form');
  form.querySelector('input[name=offset]').value = offset;
  htmx.trigger(form, 'change');
}
</script>
{% endblock %}
