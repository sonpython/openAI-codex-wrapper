# Cloudflare Tunnel deploy overlay — full stack with LOCAL builds.
# Use this on a self-hosted Docker host that builds gateway/worker images
# locally and publishes through a Cloudflare Tunnel (no public ports).
#
# Difference vs docker-compose.production.yml:
#   - production.yml pulls gateway/worker from GHCR (image-based deploy)
#   - tunnel.yml builds gateway/worker locally (source-based deploy)
#   - both add cloudflared + observability sidecars + close host ports
#
# Usage:
#   cp .env.example .env  # then fill secrets, especially CLOUDFLARED_TUNNEL_TOKEN
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d --build
#
# Public ingress is configured in Cloudflare Zero Trust → Tunnels → (your tunnel)
# → Public Hostname tab (ingress rules live in CF dashboard, not in this file).

x-logging: &default-logging
  driver: local
  options:
    max-size: "100m"
    max-file: "10"

services:

  # ── Close host ports — cloudflared handles all external ingress ─────────────

  postgres:
    logging: *default-logging
    ports: !reset []

  redis:
    logging: *default-logging
    ports: !reset []

  gateway:
    logging: *default-logging
    ports: !reset []

  worker:
    logging: *default-logging

  prometheus:
    logging: *default-logging
    ports: !reset []
    # Use the production prometheus.yml with all exporter scrape jobs.
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/alerting/prometheus-rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    logging: *default-logging
    ports: !reset []
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-change-me-in-prod}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_PUBLIC_URL:-https://grafana-openai.sonpython.com}"
      GF_SERVER_DOMAIN: "${GRAFANA_PUBLIC_DOMAIN:-grafana-openai.sonpython.com}"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  otel-collector:
    logging: *default-logging
    ports: !reset []

  # ── Public ingress: Cloudflare Tunnel ───────────────────────────────────────

  cloudflared:
    image: cloudflare/cloudflared:2025.1.0
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    depends_on:
      gateway:
        condition: service_started

  # ── Observability stack — Loki, Tempo, Alertmanager, Promtail ───────────────

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    logging: *default-logging
    # Opt-in profile — needs SLACK_WEBHOOK_URL / PAGERDUTY_KEY set + config.expand-env.
    # Enable with `docker compose --profile alerts up -d alertmanager` after wiring envs.
    profiles: ["alerts"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--config.expand-env=true"
    volumes:
      - ./infra/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ./infra/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo

  promtail:
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  # ── Exporters ───────────────────────────────────────────────────────────────

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-codex}:${POSTGRES_PASSWORD:-codex}@postgres:5432/${POSTGRES_DB:-codex_wrapper}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis

  # ── Postgres backup (daily cron) ────────────────────────────────────────────

  postgres-backup:
    build:
      context: infra/backup
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-codex}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-codex}"
      POSTGRES_DB: "${POSTGRES_DB:-codex_wrapper}"
      BACKUP_AGE_RECIPIENT: "${BACKUP_AGE_RECIPIENT:-}"
      BACKUP_S3_BUCKET: "${BACKUP_S3_BUCKET:-}"
      BACKUP_S3_ENDPOINT: "${BACKUP_S3_ENDPOINT:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  alertmanager_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
