server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Read Docker JSON log files for all containers on this host.
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only ship logs from containers in the codex-wrapper compose project.
          - name: label
            values: ["com.docker.compose.project=codex-wrapper"]
    relabel_configs:
      # Use the container name as the service label in Loki.
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: service
      # Preserve the compose service name for easier filtering.
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # Add environment label.
      - replacement: production
        target_label: env
      # Drop the internal Promtail metadata labels before shipping.
      - action: labelmap
        regex: __meta_docker_container_label_com_docker_compose_(.+)
        replacement: compose_$1

    pipeline_stages:
      # Docker log lines are JSON-wrapped: {"log":"...", "stream":"stdout", "time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - output:
          source: output
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Try to parse structured JSON from the log line itself (structlog output).
      - json:
          expressions:
            level: level
            event: event
            request_id: request_id
          source: output
      - labels:
          level:
          stream:
