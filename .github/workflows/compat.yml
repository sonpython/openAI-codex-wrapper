name: compat

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "dev"]

jobs:
  compat:
    name: SDK Compat (Python + Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Validate docker-compose.test.yml syntax
        run: docker compose -f docker-compose.test.yml config > /dev/null

      - name: Build and start test stack
        run: docker compose -f docker-compose.test.yml up -d --build --wait
        timeout-minutes: 10

      - name: Wait for gateway healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/healthz; then
              echo "Gateway healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Gateway did not become healthy in time"
          docker compose -f docker-compose.test.yml logs gateway-test
          exit 1

      - name: Run database migrations in gateway container
        run: |
          docker compose -f docker-compose.test.yml exec -T gateway-test \
            uv run alembic upgrade head

      - name: Provision test API key
        id: provision_key
        run: |
          KEY=$(curl -sf -X POST http://localhost:8001/admin/api-keys \
            -H "X-Admin-Token: test-admin-token" \
            -H "Content-Type: application/json" \
            -d '{"user_email":"compat@example.com","name":"ci-compat-key","tier":"pro"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")
          echo "api_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Python SDK compat tests
        run: |
          # Compat is end-to-end against the gateway over HTTP — the test-runner
          # process never imports src/, so --cov would always report 0% and
          # --cov-fail-under would mask the real test result. Coverage is
          # measured by ci.yml's unit-test job, not here.
          docker compose -f docker-compose.test.yml exec -T \
            -e COMPAT_BASE_URL=http://gateway-test:8000 \
            -e COMPAT_ADMIN_TOKEN=test-admin-token \
            -e COMPAT_EXTERNAL_STACK=1 \
            test-runner \
            uv run pytest tests/compat/test-python-sdk.py -v

      - name: Install Node SDK test deps
        run: |
          docker compose -f docker-compose.test.yml exec -T \
            test-runner \
            sh -c "cd tests/compat/test_node_sdk && pnpm install --frozen-lockfile=false"

      - name: Node SDK compat tests
        run: |
          docker compose -f docker-compose.test.yml exec -T \
            -e COMPAT_BASE_URL=http://gateway-test:8000 \
            -e COMPAT_API_KEY=${{ steps.provision_key.outputs.api_key }} \
            test-runner \
            sh -c "cd tests/compat/test_node_sdk && pnpm test"

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
