name: real-codex-drift

on:
  schedule:
    - cron: "0 3 * * 0"   # Sunday 03:00 UTC
  workflow_dispatch: {}

jobs:
  smoke:
    name: Real-Codex Drift Detection
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install @openai/codex@latest
        run: |
          npm install -g @openai/codex@latest
          codex --version

      - name: Restore ChatGPT auth from encrypted secret
        run: |
          # Requires: CODEX_AUTH_JSON_AGE secret (age-encrypted auth.json)
          #           AGE_KEY secret (age private key for decryption)
          # Install age if not present
          if ! command -v age &>/dev/null; then
            curl -fsSL https://github.com/FiloSottile/age/releases/latest/download/age-v1.1.1-linux-amd64.tar.gz \
              | tar -xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen
          fi
          mkdir -p ~/.codex
          printf '%s' "${{ secrets.CODEX_AUTH_JSON_AGE }}" \
            | age --decrypt \
              --identity <(printf '%s' "${{ secrets.AGE_KEY }}") \
            > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --frozen --all-extras

      - name: Run real-codex drift tests
        run: |
          CODEX_REAL=1 uv run pytest tests/compat/test-real-codex-drift.py -v \
            --tb=short --no-header
        env:
          DATABASE_URL: "postgresql+asyncpg://unused:unused@localhost:5432/unused"
          REDIS_URL: "redis://localhost:6379/0"

      - name: Auto-create drift issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[drift] real-codex smoke failed ${new Date().toISOString().slice(0,10)}`,
              labels: ["drift", "priority/high"],
              body: [
                "## Weekly real-codex drift detection failed",
                "",
                `Run: ${runUrl}`,
                "",
                "### Likely cause",
                "JSONL schema drift in `@openai/codex@latest` vs our pinned event models.",
                "",
                "### Triage steps",
                "1. Check `@openai/codex` changelog for breaking event schema changes",
                "2. Run locally: `CODEX_REAL=1 pytest tests/compat/test-real-codex-drift.py -v`",
                "3. If new event types appear in DRIFT WARNING output:",
                "   - Add them to `src/codex/events.py`",
                "   - Add fixture to `tests/fixtures/jsonl/`",
                "   - Update `tests/fixtures/canned-prompts.json`",
                "4. If breaking change: keep pin, open upgrade-blocking issue for next sprint",
                "5. If non-breaking: bump pin in `Dockerfile.gateway` + `Dockerfile.worker`",
              ].join("\n"),
            });
