name: Deploy

on:
  push:
    tags:
      - "v*.*.*"

# Require the compat suite to pass on this exact commit before deploying.
# The `needs` key below blocks deploy until compat succeeds.

jobs:
  # ── Gate: run compat suite on the tagged commit ───────────────────────────
  compat-gate:
    name: Compat Suite Gate
    uses: ./.github/workflows/compat.yml

  # ── Build + push images to GHCR ──────────────────────────────────────────
  build:
    name: Build & Push Images
    needs: compat-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codex-wrapper-gateway:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/codex-wrapper-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codex-wrapper-worker:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/codex-wrapper-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backup image
        uses: docker/build-push-action@v6
        with:
          context: infra/backup
          file: infra/backup/Dockerfile.backup
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codex-wrapper-backup:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/codex-wrapper-backup:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SSH deploy to production VM ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production   # requires reviewer approval if configured

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/codex-wrapper

            # Pull latest code for compose files + configs.
            git fetch --tags --quiet
            git checkout ${{ github.ref_name }}

            # Export image tag so compose overlay uses the pinned version.
            export IMAGE_TAG=${{ github.ref_name }}

            # Pull new images (timeout 5 min).
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.production.yml \
              pull --quiet

            # Rolling restart: compose replaces containers one by one.
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.production.yml \
              up -d --remove-orphans

            # Prune dangling images to reclaim disk.
            docker image prune -f

            # Verify gateway health after deploy.
            sleep 5
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.production.yml \
              exec -T gateway \
              curl -sf http://localhost:8000/healthz || \
              (echo "Health check failed after deploy" && exit 1)

            echo "Deploy complete: IMAGE_TAG=$IMAGE_TAG"
